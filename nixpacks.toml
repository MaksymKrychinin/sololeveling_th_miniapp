# Railway - nixpacks.toml
# Configuration for Railway deployment

[phases.setup]
nixPkgs = ["nodejs-20_x", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm db:generate",
  "pnpm build --filter=api --filter=bot"
]

[start]
cmd = "node apps/api/dist/index.js"
