<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="description" content="Level up your real life with Solo Leveling inspired habit tracking" />

    <!-- Telegram Mini App Meta Tags -->
    <meta name="telegram:card" content="app" />
    <meta name="telegram:title" content="Solo Leveling: Quest Tracker" />
    <meta name="telegram:description" content="Transform your daily habits into an epic RPG adventure" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Solo Leveling: Quest Tracker" />
    <meta property="og:description" content="Gamified habit tracking inspired by Solo Leveling" />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <title>Solo Leveling: Quest Tracker</title>

    <style>
      /* Prevent FOUC and add loading state */
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #0F172A;
        color: #F1F5F9;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }

      /* Loading Screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-logo {
        font-family: 'Orbitron', sans-serif;
        font-size: 32px;
        font-weight: 800;
        background: linear-gradient(135deg, #8B5CF6 0%, #06B6D4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 32px;
        animation: pulse 2s ease-in-out infinite;
      }

      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(139, 92, 246, 0.2);
        border-top: 4px solid #8B5CF6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
      }

      .loading-text {
        margin-top: 24px;
        font-size: 14px;
        color: #94A3B8;
        animation: fadeInOut 2s ease-in-out infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.05); }
      }

      @keyframes fadeInOut {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }

      /* App Container */
      #root {
        width: 100%;
        height: 100vh;
        height: 100dvh; /* Dynamic viewport height for mobile */
        overflow: hidden;
      }

      /* Telegram viewport fix */
      html {
        height: 100%;
        height: 100dvh;
      }

      /* Prevent pull-to-refresh */
      body {
        overscroll-behavior-y: contain;
      }

      /* Safe area insets for iOS */
      @supports (padding: max(0px)) {
        body {
          padding-left: max(0px, env(safe-area-inset-left));
          padding-right: max(0px, env(safe-area-inset-right));
        }
      }
    </style>

    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-logo">SOLO LEVELING</div>
      <div class="loading-spinner"></div>
      <div class="loading-text">Awakening your hunter profile...</div>
    </div>

    <!-- React App Root -->
    <div id="root"></div>

    <!-- Main App Script -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Hide loading screen after app loads -->
    <script>
      window.addEventListener('load', () => {
        // Initialize Telegram Web App
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();

          // Set header and background colors
          window.Telegram.WebApp.setHeaderColor('#0F172A');
          window.Telegram.WebApp.setBackgroundColor('#0F172A');

          // Enable closing confirmation
          window.Telegram.WebApp.enableClosingConfirmation();
        }

        // Hide loading screen after a short delay
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hidden');
            setTimeout(() => {
              loadingScreen.remove();
            }, 500);
          }
        }, 1000);
      });

      // Handle errors
      window.addEventListener('error', (event) => {
        console.error('Application error:', event.error);
        const loadingText = document.querySelector('.loading-text');
        if (loadingText) {
          loadingText.textContent = 'Failed to load application. Please try again.';
          loadingText.style.color = '#EF4444';
        }
      });
    </script>
  </body>
</html>
