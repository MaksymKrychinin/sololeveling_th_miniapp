# Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: solo-leveling-api
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm db:generate && pnpm build --filter=api
    startCommand: cd apps/api && node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: DATABASE_URL
        fromDatabase:
          name: solo-leveling-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: solo-leveling-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /health

  - type: worker
    name: solo-leveling-bot
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm db:generate && pnpm build --filter=bot
    startCommand: cd apps/bot && node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: DATABASE_URL
        fromDatabase:
          name: solo-leveling-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: solo-leveling-redis
          type: redis
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false

databases:
  - name: solo-leveling-db
    databaseName: solo_leveling
    plan: free
    region: oregon

  - name: solo-leveling-redis
    plan: free
    region: oregon
