version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: solo-leveling-postgres-dev
    environment:
      POSTGRES_DB: solo_leveling_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    platform: linux/arm64/v8
    container_name: solo-leveling-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: axllent/mailpit:latest
    platform: linux/arm64/v8
    container_name: solo-leveling-mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_SMTP_BIND_ADDR: 0.0.0.0:1025
      MP_UI_BIND_ADDR: 0.0.0.0:8025
    logging:
      driver: none

volumes:
  postgres_dev_data:
    name: solo-leveling-postgres-dev
  redis_dev_data:
    name: solo-leveling-redis-dev

networks:
  default:
    name: solo-leveling-dev-network
